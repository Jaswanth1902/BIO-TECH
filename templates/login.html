{% extends "base.html" %}

{% block title %}Login - Supply Chain{% endblock %}

{% block content %}
<article class="grid">
    <div>
        <hgroup>
            <h1>Sign in</h1>
            <h2>Welcome back to the Tracking System</h2>
        </hgroup>
        <form method="POST">
            <label for="username">Username
                <input type="text" id="username" name="username" placeholder="admin" required>
            </label>
            <label for="password">Password
                <input type="password" id="password" name="password" placeholder="admin123" required>
            </label>
            <button type="submit">Login</button>
        </form>
    </div>
    <div style="background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=800&auto=format&fit=crop'); background-size: cover; border-radius: 10px; min-height: 400px;">
    </div>
</article>
{% endblock %}
