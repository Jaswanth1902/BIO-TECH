{% extends "base.html" %}

{% block title %}Log Event - Bio-Tech Traceability{% endblock %}

{% block content %}
<section class="fade-in" style="max-width: 900px; margin: 0 auto;">
    <hgroup>
        <h1>Lifecycle Event Logging</h1>
        <p>Record a new transition or environmental reading for a batch.</p>
    </hgroup>

    <article>
        <header>
            <h3 style="margin-bottom: 0;"><i class="fa-solid fa-list-check" style="margin-right: 12px; color: var(--brand-primary);"></i>Event Specifics</h3>
            <p class="text-muted" style="margin-bottom: 0;">Select a batch and appropriate stage to advance the chain.</p>
        </header>

        <form action="{{ url_for('create_event') }}" method="post">
            <div class="grid">
                <div>
                    <label for="batch_id">
                        Select Targeted Batch
                        <select id="batch_id" name="batch_id" onchange="updateEventOptions()" required>
                            <option value="">-- Choose Batch --</option>
                            {% for batch in batches %}
                            <option value="{{ batch.id }}" data-current="{{ batch_states[batch.id] or 'none' }}">
                                {{ batch.name }} ({{ batch.public_id }}) — Currently: {{ (batch_states[batch.id] or 'initialized') | capitalize }}
                            </option>
                            {% endfor %}
                        </select>
                    </label>

                    <label for="event_type">
                        Next Lifecycle Stage
                        <select id="event_type" name="event_type" required>
                            <option value="">-- Select Batch First --</option>
                        </select>
                    </label>

                    <label for="location">
                        Event Location
                        <input type="text" id="location" name="location" placeholder="e.g. Storage Unit A, Cold Trans-1" required>
                    </label>
                </div>

                <div>
                    <div class="grid">
                        <label for="temperature">
                            Temperature (°C)
                            <input type="number" id="temperature" name="temperature" step="0.1" placeholder="e.g. -20.5">
                        </label>
                        <label for="humidity">
                            Humidity (%)
                            <input type="number" id="humidity" name="humidity" step="0.1" placeholder="e.g. 55.0">
                        </label>
                    </div>

                    <label for="remarks">
                        Verification Remarks
                        <textarea id="remarks" name="remarks" rows="4" placeholder="Log any observations or regulatory notes here..."></textarea>
                    </label>
                </div>
            </div>

            <div style="margin-top: 2rem; border-top: 1px dashed var(--glass-border); padding-top: 1.5rem; text-align: center;">
                <button type="submit" class="primary-btn" style="min-width: 280px;">
                    Append to Blockchain <i class="fa-solid fa-cloud-arrow-up" style="margin-left: 8px;"></i>
                </button>
            </div>
        </form>
    </article>
</section>

<script>
    function updateEventOptions() {
        const batchSelect = document.getElementById('batch_id');
        const eventSelect = document.getElementById('event_type');
        const selectedOption = batchSelect.options[batchSelect.selectedIndex];
        
        if (!selectedOption.value) {
            eventSelect.innerHTML = '<option value="">-- Select Batch First --</option>';
            return;
        }

        const currentState = selectedOption.getAttribute('data-current');
        let allowed = [];
        
        if (currentState === 'none' || currentState === 'initialized') allowed = [['collection', '📦 Collection']];
        else if (currentState === 'collection') allowed = [['transport', '🚚 Transport']];
        else if (currentState === 'transport') allowed = [['storage', '❄️ Storage']];
        else if (currentState === 'storage') allowed = [['package', '🩹 Packaging']];
        else if (currentState === 'package') allowed = [['dispose', '🗑️ Final Disposal']];

        eventSelect.innerHTML = allowed.map(ev => `<option value="${ev[0]}">${ev[1]}</option>`).join('') || '<option value="">Chain Completed</option>';
    }
</script>
{% endblock %}
